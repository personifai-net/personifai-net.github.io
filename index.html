<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonifAI — Temporarily Unavailable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 520px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #f5f5f5;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #b0b0c0;
            margin-bottom: 0.5rem;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PersonifAI</div>
        <div class="icon">&#9889;</div>
        <h1>We'll be right back</h1>
        <p>PersonifAI is temporarily unavailable. We're aware and working on it.</p>
    </div>
</body>
</html>
