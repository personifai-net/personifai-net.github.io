<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonifAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 520px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #b0b0c0;
        }

        a {
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PersonifAI</div>
        <p>Placeholder landing page — content coming soon.</p>
        <p><a href="https://personifai.net">personifai.net</a> &middot; <a href="https://status.personifai.net">status</a></p>

</html>
